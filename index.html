<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thane Security</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
    <style>
        /* This ensures the site is never white, even if CSS fails to load */
        body { background-color: #1a1a1a !important; color: #f5f5f5; margin: 0; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="banner-container">
            <img src="banner.png" alt="Thane Security Banner" class="banner">
        </div>
        
        <h1 class="tagline">Know Your Digital Footprint. Manage Your Personal Risk.</h1>

        <div class="hero-right">
            <div id="globe-container">
                <div class="osint-label label-1">PROFILES: 128</div>
                <div class="osint-label label-2">EMAILS: 54</div>
                <div class="osint-label label-3">WEAK PASSWORDS: 12</div>
                <div class="osint-label label-4">LINKED ACCOUNTS: 23</div>
            </div>
        </div>
    </section>

    <h2 class="section-title">Powered by SLADE Intelligence</h2>

    <div class="tile-container">
        <div class="tile"><h3>S</h3><p>Surface Web Search</p></div>
        <div class="tile"><h3>L</h3><p>Link Data Points</p></div>
        <div class="tile"><h3>A</h3><p>Analyze Findings</p></div>
        <div class="tile"><h3>D</h3><p>Disclose Report</p></div>
        <div class="tile"><h3>E</h3><p>Educate</p></div>
    </div>

</body>
</html>
